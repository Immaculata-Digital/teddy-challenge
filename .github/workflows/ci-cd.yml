name: CI/CD Pipeline — Teddy Open Finance (Pattern Concordia)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/teddy-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/teddy-frontend

jobs:
  # ─────────────────────────────────────────────────
  # STAGE 1: Validação (Roda no GitHub)
  # ─────────────────────────────────────────────────
  validate-backend:
    name: Backend (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - uses: nrwl/nx-set-shas@v4
      - run: npx nx affected --target=test --projects=api --base=$NX_BASE --head=$NX_HEAD --passWithNoTests
      - run: npx nx affected --target=lint --projects=api --base=$NX_BASE --head=$NX_HEAD

  validate-frontend:
    name: Frontend (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - uses: nrwl/nx-set-shas@v4
      - run: npx nx affected --target=test --projects=front-end --base=$NX_BASE --head=$NX_HEAD --passWithNoTests
      - run: npx nx affected --target=lint --projects=front-end --base=$NX_BASE --head=$NX_HEAD

  # ─────────────────────────────────────────────────
  # STAGE 2: Build & Push (Roda no GitHub)
  # ─────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    needs: [validate-backend, validate-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: back-end/Dockerfile
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest

      - name: 🏗️ Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: front-end/Dockerfile
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest

  # ─────────────────────────────────────────────────
  # STAGE 3: Deploy (Roda na sua VPS)
  # ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: 🚀 Checkout Infra
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔑 Login to GHCR (VPS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 📝 Synchronize Environment Config
        run: |
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "DB_HOST=${{ secrets.DB_HOST }}"
            echo "DB_PORT=${{ secrets.DB_PORT }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASS=${{ secrets.DB_PASS }}"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "VITE_API_URL=http://localhost:3000/api/v1"
            echo "REPO_OWNER_LOWER=${REPO_OWNER_LOWER}"
          } > .env

      - name: 📥 Pull Images
        run: docker compose pull

      - name: ⚡ Activate New Instance
        run: docker compose up -d

      - name: 🩺 Monitor Health
        run: |
          for i in {1..5}; do
            echo "🩺 Checando saúde da API (Tentativa $i/5)..."
            sleep 5
            RESPONSE=$(curl -s http://localhost:3000/api/v1/healthz || echo "FAILED")
            if [[ "$RESPONSE" == *"ok"* ]]; then
              echo "✅ API Online!"
              exit 0
            fi
          done
          echo "❌ API não subiu corretamente."
          exit 1

      - name: 🧹 Cleanup
        if: always()
        run: |
          docker image prune -f
          rm -f .env
