name: CI/CD Pipeline — Teddy Open Finance (Pattern Concordia)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────
  # JOB: Validação BACK-END
  # ─────────────────────────────────────────────────
  validate-backend:
    name: Backend (Test & Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Run Backend Tests
        run: npx nx test api --passWithNoTests
      - name: Run Backend Build
        run: npx nx build api
      - name: Check Format
        run: npx nx format:check

  # ─────────────────────────────────────────────────
  # JOB: Validação FRONT-END
  # ─────────────────────────────────────────────────
  validate-frontend:
    name: Frontend (Test & Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Run Frontend Tests
        run: npx nx test front-end --passWithNoTests
      - name: Run Frontend Build
        run: npx nx build front-end
      - name: Check Format
        run: npx nx format:check

  # ─────────────────────────────────────────────────
  # STAGE 2: Build & Push (Roda no GitHub)
  # ─────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    needs: [validate-backend, validate-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      repo_owner: ${{ steps.vars.outputs.repo_owner }}
    steps:
      - name: 🚀 Checkout
        uses: actions/checkout@v4
      - name: 🆔 Metadata Generation
        id: vars
        run: |
          echo "repo_owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🏗️ Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: back-end/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.repo_owner }}/teddy-backend:latest
      - name: 🏗️ Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: front-end/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.repo_owner }}/teddy-frontend:latest
          build-args: |
            VITE_API_URL=https://api-teddy.thiagolamberti.com.br/api/v1

  # ─────────────────────────────────────────────────
  # STAGE 3: Deploy (Roda na sua VPS)
  # ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: [self-hosted, production]
    steps:
      - name: 🚀 Checkout Infra
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: 🔑 Login to GHCR (VPS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: 📝 Synchronize Environment Config
        run: |
          {
            echo "DB_HOST=${{ secrets.DB_HOST }}"
            echo "DB_PORT=${{ secrets.DB_PORT }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASS=${{ secrets.DB_PASS }}"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "VITE_API_URL=https://api-teddy.thiagolamberti.com.br/api/v1"
            echo "REPO_OWNER_LOWER=${{ needs.build-and-push.outputs.repo_owner }}"
          } > .env
      - name: 📥 Pull Images
        run: docker compose pull
      - name: ⚡ Activate New Instance
        run: docker compose up -d
      - name: 🩺 Monitor Health
        run: |
          for i in {1..5}; do
            echo "🩺 Checando saúde da API (Tentativa $i/5)..."
            sleep 5
            RESPONSE=$(curl -s http://localhost:3000/api/v1/healthz || echo "FAILED")
            if [[ "$RESPONSE" == *"ok"* ]]; then
              echo "✅ API Online!"
              exit 0
            fi
          done
          echo "❌ API não subiu corretamente."
          exit 1
      - name: 🧹 Cleanup
        if: always()
        run: |
          docker image prune -f
          rm -f .env
