name: CI/CD Pipeline вЂ” Teddy Open Finance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB: ValidaГ§ГЈo BACK-END
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  validate-backend:
    name: Backend (Lint & Test)
    runs-on: production
    steps:
      - name: рџљЂ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: рџџў Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: рџ“Ґ Install dependencies
        run: npm ci

      - name: рџЏ—пёЏ Nx Set SHAs
        uses: nrwl/nx-set-shas@v4

      - name: рџ§Є Run Backend Tests
        run: npx nx affected --target=test --projects=api --base=$NX_BASE --head=$NX_HEAD --passWithNoTests

      - name: рџ”Ќ Run Backend Lint
        run: npx nx affected --target=lint --projects=api --base=$NX_BASE --head=$NX_HEAD

      - name: рџЏ—пёЏ Run Backend Build
        run: npx nx affected --target=build --projects=api --base=$NX_BASE --head=$NX_HEAD

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB: ValidaГ§ГЈo FRONT-END
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  validate-frontend:
    name: Frontend (Lint & Test)
    runs-on: production
    steps:
      - name: рџљЂ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: рџџў Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: рџ“Ґ Install dependencies
        run: npm ci

      - name: рџЏ—пёЏ Nx Set SHAs
        uses: nrwl/nx-set-shas@v4

      - name: рџ§Є Run Frontend Tests
        run: npx nx affected --target=test --projects=front-end --base=$NX_BASE --head=$NX_HEAD --passWithNoTests

      - name: рџ”Ќ Run Frontend Lint
        run: npx nx affected --target=lint --projects=front-end --base=$NX_BASE --head=$NX_HEAD

      - name: рџЏ—пёЏ Run Frontend Build
        run: npx nx affected --target=build --projects=front-end --base=$NX_BASE --head=$NX_HEAD

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB: Deploy Direto na VPS (Self-Hosted)
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  deploy:
    name: Deploy to Server
    needs: [validate-backend, validate-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: production
    steps:
      - name: рџљЂ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: рџ“ќ Synchronize Environment Config
        run: |
          {
            echo "DB_HOST=${{ secrets.DB_HOST }}"
            echo "DB_PORT=${{ secrets.DB_PORT }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASS=${{ secrets.DB_PASS }}"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "VITE_API_URL=http://localhost:3000/api/v1"
          } > .env

      - name: вљЎ Activate New Instance
        run: docker compose up -d --build

      - name: рџ©є Monitor Health & Stability
        id: healthcheck
        run: |
          SLEEP_TIME=2
          for i in {1..5}; do
            echo "рџ©є Tentativa $i/5 (Aguardando ${SLEEP_TIME}s)..."
            sleep $SLEEP_TIME
            
            # Verifica o healthcheck do back-end
            RESPONSE=$(curl -s http://localhost:3000/api/v1/healthz || echo "FAILED")
            
            if [[ "$RESPONSE" == *"ok"* ]]; then
              echo "вњ… API saudГЎvel!"
              exit 0
            fi
            
            echo "вљ пёЏ Tentativa $i/5: Resposta inesperada: $RESPONSE"
            SLEEP_TIME=$((SLEEP_TIME * 2))
          done

          echo "вќЊ API nГЈo ficou saudГЎvel apГіs o deploy."
          exit 1

      - name: рџљЁ Deployment Failure Report
        if: failure()
        run: |
          echo "================================================================="
          echo "рџ”Ќ DIAGNГ“STICO DE FALHA DE DEPLOY"
          echo "================================================================="
          docker ps -a
          echo "рџ“„ Logs do Backend:"
          docker logs --tail 50 teddy-backend
          echo "================================================================="

      - name: рџ§№ Clean Up
        if: always()
        run: |
          docker image prune -f
          rm -f .env
